<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberConsulting - Contacto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark">
            <div class="container">
                <a class="navbar-brand fw-bold" href="index.html">CyberConsulting</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
                        <li class="nav-item"><a class="nav-link" href="nosotros.html">Nosotros</a></li>
                        <li class="nav-item"><a class="nav-link" href="servicios.html">Servicios</a></li>
                        <li class="nav-item"><a class="nav-link" href="equipo.html">Equipo</a></li>
                        <li class="nav-item"><a class="nav-link" href="recursos.html">Recursos</a></li>
                        <li class="nav-item"><a class="nav-link active" href="contacto.html">Contacto</a></li>
                        <li class="nav-item"><a class="nav-link" href="faq.html">FAQ</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container my-5">
        <section class="hero mb-5">
            <div class="row align-items-center p-4">
                <div class="col-md-12 text-center">
                    <img src="img/nosotros.png" class="img-fluid rounded mb-4" alt="Imagen Banner Contacto">
                    <h1 class="display-4 fw-bold text-white">Contacto</h1>
                </div>
            </div>
        </section>

        <section class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-lg p-4">
                    <form action="#" method="POST">
                        <div class="mb-3">
                            <label for="nombre" class="form-label fw-bold">Nombre completo</label>
                            <input type="text" class="form-control" id="nombre" placeholder="Ej. Juan Pérez" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="correo" class="form-label fw-bold">Correo electrónico</label>
                                <input type="email" class="form-control" id="correo" placeholder="correo@ejemplo.com" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="telefono" class="form-label fw-bold">Teléfono</label>
                                <input type="tel" class="form-control" id="telefono" placeholder="+56 9 ...">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="servicio" class="form-label fw-bold">Servicio de interés</label>
                            <select id="servicio" class="form-select">
                                <option value="">Seleccione una opción...</option>
                                <option value="1">Auditoría Cloud</option>
                                <option value="2">Securización de Redes</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="mensaje" class="form-label fw-bold">Mensaje</label>
                            <textarea id="mensaje" class="form-control" rows="4" placeholder="Escribe tu mensaje aquí..." required></textarea>
                        </div>

                        <div class="text-center">
                            <button type="submit" class="btn btn-primary btn-lg w-100 py-3 mt-3">Enviar Mensaje</button>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
