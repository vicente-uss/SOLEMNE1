<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberConsulting - Contacto</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="nosotros.html">Nosotros</a></li>
                <li><a href="servicios.html">Servicios (BS)</a></li>
                <li><a href="equipo.html">Nuestro Equipo</a></li>
                <li><a href="recursos.html">Recursos</a></li>
                <li><a href="contacto.html">Contacto (BS)</a></li>
                <li><a href="faq.html">Preguntas Frecuentes</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <img src="" alt="Imagen Banner Contacto">
            <h1>Contacto</h1>
        </section>

        <section>
            <form action="#" method="POST">
                <p>
                    <label for="nombre">Nombre completo</label><br>
                    <input type="text" id="nombre" placeholder="Ej. Juan Pérez" required>
                </p>
                <p>
                    <label for="correo">Correo electrónico</label><br>
                    <input type="email" id="correo" placeholder="correo@ejemplo.com" required>
                </p>
                <p>
                    <label for="telefono">Teléfono</label><br>
                    <input type="tel" id="telefono" placeholder="+56 9 ...">
                </p>
                <p>
                    <label for="servicio">Servicio de interés</label><br>
                    <select id="servicio">
                        <option value="">Seleccione una opción...</option>
                        <option value="1">Auditoría Cloud</option>
                        <option value="2">Securización de Redes</option>
                    </select>
                </p>
                <p>
                    <label for="mensaje">Mensaje</label><br>
                    <textarea id="mensaje" rows="4" required></textarea>
                </p>
                <p>
                    <button type="submit">Enviar</button>
                </p>
            </form>
        </section>
    </main>
</body>
</html>
